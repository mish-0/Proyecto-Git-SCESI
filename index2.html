<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADIVINA TU POKÉMON</title>
    <link rel="icon" href="img/pikachuDetective.png">
    <link rel="stylesheet" href="diseño2.css">
</head>
<body>
    <header>
        <h1>¿Quién es ese Pokémon?</h1>
        <p>Responde las preguntas y adivinaré tu Pokémon.</p>
    </header>

    <main id="game-container">
        <div class="game-layout">
            <div class="game-content">
                <h2 id="question-text">Cargando...</h2>
                <div class="button-group">
                    <button id="yes-btn">SÍ</button>
                </div>
            </div>
            <div class="game-image">
                <img src="img/pikachuDetective.png" alt="Detective Pikachu" id="pokemon-img">
            </div>
        </div>
    </main>

    <footer>
        <p>Proyecto Grupal (PokePibbles)</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
