<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADIVINA TU POKÉMON</title>
    <link rel="stylesheet" href="diseño.css">
    <link rel="icon" href="img/pikachuDetective.png">
</head>
<body>
    <header>
        <h1>¿Quién es ese Pokémon?</h1>
        <p>Piensa en un Pokémon de la 1ra Generación y yo lo adivinaré.</p>
    </header>

    <main id="game-container">
    <div class="game-layout">
        <!-- Lado izquierdo: Preguntas y Botones -->
        <div class="game-content">
            <h2 id="question-text">¿Estás listo para empezar?</h2>
            <div class="button-group">
                <button onclick="window.location.href='index2.html'">SÍ</button>
            </div>
        </div>

        <!-- Lado derecho: La imagen -->
        <div class="game-image">
            <img src="img/pikachuDetective.png" alt="Detective Pikachu" id="pokemon-img">
        </div>
    </div>
</main>

    <footer>
        <p>Proyecto Grupal (PokePibbles)</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
